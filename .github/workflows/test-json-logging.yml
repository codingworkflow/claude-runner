name: Test JSON Logging
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - id: step1
        uses: claude-code
        with:
          prompt: "Say hello world"
          model: claude-3-5-sonnet-20241022
          output_session: false

      - id: step2  
        uses: claude-code
        with:
          prompt: "Count to 3"
          model: claude-3-5-sonnet-20241022
          output_session: false

      - id: step3
        uses: claude-code  
        with:
          prompt: "Say goodbye"
          model: claude-3-5-sonnet-20241022
          output_session: false